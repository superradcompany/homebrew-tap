name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix, e.g. 0.3.12)"
        required: true

jobs:
  update:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update formula
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x scripts/update-formula.sh
          scripts/update-formula.sh "${{ steps.version.outputs.version }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/microsandbox.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update microsandbox to ${{ steps.version.outputs.version }}"
          git push
